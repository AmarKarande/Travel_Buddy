<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="./favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="A travel planning app, recommends nearby attractions, restaurants, and hotels while providing real-time weather forecasts" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <title>Travel Buddy</title>

    <style>
      /* Prevent any flash of scrolled content before React mounts */
      html { scroll-behavior: auto !important; }
    </style>

    <!-- ✅ Force browser to always start at top, disable scroll restoration -->
    <script>
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
      }
      window.onload = () => window.scrollTo(0, 0);
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
